name: Manual Rebuild and Republish Image
on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/comfyui-docker
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-tag:
    name: Resolve Current Tag
    runs-on: ubuntu-latest
    outputs:
      current_tag: ${{ steps.resolve.outputs.current_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install prerequisites (jq, curl)
        run: |
          set -e
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq curl
          fi

      - name: Determine current tag from comfyui_version.py
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          VER=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' comfyui_version.py | tr -d '\r')
          if [ -z "${VER}" ]; then
            echo "Could not read version from comfyui_version.py; aborting." >&2
            exit 1
          fi
          echo "current_tag=v${VER}" >> "$GITHUB_OUTPUT"

  build-gh:
    name: Build on GitHub Runner (primary)
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Show disk usage (pre)
        run: df -h | sed 's/\s\+/ /g'

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Prune Docker caches (pre)
        run: |
          docker builder prune -af || true
          docker system prune -af --volumes || true

      - name: Show disk usage (post-clean)
        run: df -h | sed 's/\s\+/ /g'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cleanup: true

      - name: Check CR_PAT secret
        id: crpat
        shell: bash
        run: |
          if [ -n "${{ secrets.CR_PAT }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR with GITHUB_TOKEN
        if: ${{ steps.crpat.outputs.present == 'false' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR with CR_PAT
        if: ${{ steps.crpat.outputs.present == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and Push (GH runner)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=gh
          cache-to: type=gha,mode=max,scope=gh
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.check-tag.outputs.current_tag }}
            ${{ env.IMAGE_NAME }}:latest

  build-self:
    name: Build on Self-Hosted (fallback)
    needs: [check-tag, build-gh]
    if: ${{ always() && needs.build-gh.result != 'success' }}
    runs-on: [self-hosted, linux, x64, homelab]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cleanup: true

      - name: Check CR_PAT secret
        id: crpat
        shell: bash
        run: |
          if [ -n "${{ secrets.CR_PAT }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR with GITHUB_TOKEN
        if: ${{ steps.crpat.outputs.present == 'false' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR with CR_PAT
        if: ${{ steps.crpat.outputs.present == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and Push (self-hosted)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=gh
          cache-to: type=gha,mode=max,scope=gh
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.check-tag.outputs.current_tag }}
            ${{ env.IMAGE_NAME }}:latest

  publish:
    name: Update Release
    needs: [check-tag, build-gh, build-self]
    if: ${{ always() && (needs.build-gh.result == 'success' || needs.build-self.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Update GitHub Release (same tag)
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.check-tag.outputs.current_tag }}
          name: Release ${{ needs.check-tag.outputs.current_tag }}
          body: |
            New version synced from upstream ComfyUI.
            Docker image:
            - docker pull ${{ env.IMAGE_NAME }}:${{ needs.check-tag.outputs.current_tag }}
            - docker pull ${{ env.IMAGE_NAME }}:latest
          draft: false
          prerelease: false

  finalize:
    name: Finalize Outcome
    needs: [check-tag, build-gh, build-self, publish]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail if both build paths failed
        if: ${{ !(needs.build-gh.result == 'success' || needs.build-self.result == 'success') }}
        run: |
          echo "Manual rebuild failed on both GitHub-hosted and self-hosted paths."
          exit 1
